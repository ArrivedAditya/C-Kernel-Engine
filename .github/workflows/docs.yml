name: Build and Deploy Documentation

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'include/**'
      - 'src/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'docs/**'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Build C library (for test running)
        run: |
          make clean || true
          make
        continue-on-error: true  # Tests are optional for docs build

      - name: Build Documentation
        run: |
          cd docs/site
          chmod +x build.sh
          ./build.sh

      - name: Copy Doxygen HTML to site
        run: |
          # Remove symlink and copy actual files for deployment
          rm -f docs/site/doxygen
          cp -r docs/doxygen_output/html docs/site/doxygen

      - name: Summarize docs preview
        run: |
          grep -n "Featured Deep Dive: Gated DeltaNet" docs/site/index.html
          grep -n "deltanet-deep-dive.html" docs/site/index.html
          {
            echo "### Documentation preview"
            echo ""
            echo "Compiled docs are available as the \`docs-site\` artifact on this workflow run."
            echo ""
            echo "Homepage DeltaNet checks:"
            echo ""
            echo '```text'
            grep -n "Featured Deep Dive: Gated DeltaNet" docs/site/index.html
            grep -n "deltanet-deep-dive.html" docs/site/index.html
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload compiled docs artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/site
          if-no-files-found: error
          retention-days: 7

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/site
          keep_files: true
