<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
  <title id="title">CKE contribution, recognition, copyright, and licensing flow</title>
  <desc id="desc">A contribution moves from discovery and reproduction through review and merge. Git history preserves recognition, while copyright and project licensing remain separate legal contracts. CKE has not yet adopted a root license.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151b20"/>
      <stop offset="0.56" stop-color="#202a30"/>
      <stop offset="1" stop-color="#302719"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#47b475"/>
      <stop offset="0.58" stop-color="#07adf8"/>
      <stop offset="1" stop-color="#ffb400"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#fff" stroke-opacity=".035"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity=".3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#6f858f"/>
    </marker>
  </defs>

  <rect width="1600" height="1040" rx="28" fill="url(#bg)"/>
  <rect width="1600" height="1040" rx="28" fill="url(#grid)"/>

  <text x="84" y="82" fill="#ffb400" font-family="monospace" font-size="21" font-weight="700" letter-spacing="4">CONTRIBUTION CONTRACT</text>
  <text x="84" y="142" fill="#fff" font-family="sans-serif" font-size="46" font-weight="800">One merged patch creates several different records.</text>
  <text x="84" y="184" fill="#afbbc1" font-family="sans-serif" font-size="23">Engineering recognition, copyright ownership, and software licensing are related, but they are not interchangeable.</text>

  <path d="M190 350H1410" fill="none" stroke="url(#flow)" stroke-width="8" stroke-linecap="round"/>

  <g font-family="sans-serif" filter="url(#shadow)">
    <g transform="translate(70 245)">
      <rect width="270" height="210" rx="18" fill="#21362d" stroke="#47b475" stroke-width="3"/>
      <text x="24" y="41" fill="#47b475" font-family="monospace" font-size="18" font-weight="700">01 DISCOVER</text>
      <text x="24" y="80" fill="#fff" font-size="27" font-weight="750">Find a real gap</text>
      <text x="24" y="118" fill="#c6d1cb" font-size="18">Machine, command,</text>
      <text x="24" y="146" fill="#c6d1cb" font-size="18">failure, or missing path</text>
      <text x="24" y="185" fill="#8fa69a" font-size="16">Credit starts here</text>
    </g>
    <g transform="translate(370 245)">
      <rect width="270" height="210" rx="18" fill="#20343a" stroke="#28afd4" stroke-width="3"/>
      <text x="24" y="41" fill="#38b9df" font-family="monospace" font-size="18" font-weight="700">02 REPRODUCE</text>
      <text x="24" y="80" fill="#fff" font-size="27" font-weight="750">Make evidence</text>
      <text x="24" y="118" fill="#c5d2d7" font-size="18">Before and after,</text>
      <text x="24" y="146" fill="#c5d2d7" font-size="18">tests and limitations</text>
      <text x="24" y="185" fill="#8da7b0" font-size="16">Not just line count</text>
    </g>
    <g transform="translate(670 245)">
      <rect width="270" height="210" rx="18" fill="#1e3541" stroke="#07adf8" stroke-width="3"/>
      <text x="24" y="41" fill="#07adf8" font-family="monospace" font-size="18" font-weight="700">03 SUBMIT</text>
      <text x="24" y="80" fill="#fff" font-size="27" font-weight="750">Open the PR</text>
      <text x="24" y="118" fill="#c5d2d7" font-size="18">Human accepts</text>
      <text x="24" y="146" fill="#c5d2d7" font-size="18">provenance responsibility</text>
      <text x="24" y="185" fill="#8da7b0" font-size="16">AI is a tool, not author</text>
    </g>
    <g transform="translate(970 245)">
      <rect width="270" height="210" rx="18" fill="#343322" stroke="#dba81e" stroke-width="3"/>
      <text x="24" y="41" fill="#f0b82a" font-family="monospace" font-size="18" font-weight="700">04 REVIEW</text>
      <text x="24" y="80" fill="#fff" font-size="27" font-weight="750">Test and bound</text>
      <text x="24" y="118" fill="#d8d1bc" font-size="18">Maintainer verifies</text>
      <text x="24" y="146" fill="#d8d1bc" font-size="18">claim and integration</text>
      <text x="24" y="185" fill="#aea485" font-size="16">Correction can be shared</text>
    </g>
    <g transform="translate(1270 245)">
      <rect width="260" height="210" rx="18" fill="#3a2e1b" stroke="#ffb400" stroke-width="3"/>
      <text x="24" y="41" fill="#ffb400" font-family="monospace" font-size="18" font-weight="700">05 MERGE</text>
      <text x="24" y="80" fill="#fff" font-size="27" font-weight="750">Preserve history</text>
      <text x="24" y="118" fill="#ddd2bc" font-size="18">Commit, PR, contributor</text>
      <text x="24" y="146" fill="#ddd2bc" font-size="18">index, release note</text>
      <text x="24" y="185" fill="#b3a285" font-size="16">Refactors do not erase it</text>
    </g>
  </g>

  <text x="84" y="535" fill="#fff" font-family="sans-serif" font-size="31" font-weight="800">After merge, three contracts remain separate</text>

  <g font-family="sans-serif">
    <g transform="translate(70 580)">
      <rect width="460" height="305" rx="18" fill="#1f3029" stroke="#47b475" stroke-width="2"/>
      <text x="28" y="48" fill="#47b475" font-family="monospace" font-size="19" font-weight="700">RECOGNITION</text>
      <text x="28" y="91" fill="#fff" font-size="29" font-weight="760">Who did the work?</text>
      <text x="28" y="133" fill="#cad4cf" font-size="19">Git author and commit history</text>
      <text x="28" y="168" fill="#cad4cf" font-size="19">Pull request and review record</text>
      <text x="28" y="203" fill="#cad4cf" font-size="19">CONTRIBUTORS and release notes</text>
      <rect x="28" y="238" width="400" height="42" rx="8" fill="#284438"/>
      <text x="48" y="266" fill="#8ed5ad" font-size="17" font-weight="700">PRESERVED WHEN CODE IS REPLACED</text>
    </g>

    <g transform="translate(570 580)">
      <rect width="460" height="305" rx="18" fill="#1d303a" stroke="#07adf8" stroke-width="2"/>
      <text x="28" y="48" fill="#07adf8" font-family="monospace" font-size="19" font-weight="700">COPYRIGHT</text>
      <text x="28" y="91" fill="#fff" font-size="29" font-weight="760">Who holds legal rights?</text>
      <text x="28" y="133" fill="#c7d4da" font-size="19">Depends on original human expression</text>
      <text x="28" y="168" fill="#c7d4da" font-size="19">No CKE CLA or DCO is adopted</text>
      <text x="28" y="203" fill="#c7d4da" font-size="19">Merge is not automatic assignment</text>
      <rect x="28" y="238" width="400" height="42" rx="8" fill="#243e4a"/>
      <text x="48" y="266" fill="#74c9ee" font-size="17" font-weight="700">ATTRIBUTION IS NOT OWNERSHIP</text>
    </g>

    <g transform="translate(1070 580)">
      <rect width="460" height="305" rx="18" fill="#392d1d" stroke="#ffb400" stroke-width="2"/>
      <text x="28" y="48" fill="#ffb400" font-family="monospace" font-size="19" font-weight="700">PROJECT LICENCE</text>
      <text x="28" y="91" fill="#fff" font-size="29" font-weight="760">What may users do?</text>
      <text x="28" y="133" fill="#ded3bf" font-size="19">A root LICENSE must grant permission</text>
      <text x="28" y="168" fill="#ded3bf" font-size="19">Dependency licences stay separate</text>
      <text x="28" y="203" fill="#ded3bf" font-size="19">Public source is not a licence</text>
      <rect x="28" y="238" width="400" height="42" rx="8" fill="#563d17" stroke="#ffb400" stroke-opacity=".55"/>
      <text x="48" y="266" fill="#ffd36a" font-size="17" font-weight="800">CKE ROOT LICENSE: NOT YET ADOPTED</text>
    </g>
  </g>

  <path d="M300 910V954H800" fill="none" stroke="#6f858f" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M800 886V954" fill="none" stroke="#6f858f" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1300 910V954H800" fill="none" stroke="#6f858f" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="555" y="935" width="490" height="68" rx="14" fill="#272f34" stroke="#8a9aa2"/>
  <text x="800" y="963" fill="#fff" font-family="sans-serif" font-size="20" font-weight="750" text-anchor="middle">NEXT GOVERNANCE GATE</text>
  <text x="800" y="988" fill="#b8c2c7" font-family="sans-serif" font-size="17" text-anchor="middle">Choose root licence + inbound contribution terms</text>
</svg>
